<!doctype html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <title>Контакты — iwbhappy</title>
    <script src="script.js" defer></script>
  </head>
  <body class="bg-black text-white p-8 font-sans transition-colors duration-500">

    <header class="flex justify-between items-center max-w-6xl mx-auto mb-12">
      <a href="index.html" class="flex flex-col items-center group">
        <span class="text-[10px] uppercase tracking-[0.2em] mb-1 font-bold opacity-50 group-hover:opacity-100 transition-opacity">Return to</span>
        <h1 id="logo-text" class="text-2xl font-bold tracking-tighter uppercase leading-none text-white transition-colors duration-500">iwbhappy</h1>
      </a>

      <button id="theme-btn" class="cursor-pointer flex items-center gap-2 text-[10px] uppercase tracking-[0.2em] font-bold border border-white/20 px-4 py-2 rounded-full hover:bg-white hover:text-black transition-all duration-300">
        <span id="theme-icon">🌙</span>
        <span id="theme-text">Dark</span>
      </button>
    </header>

    <main class="grid grid-cols-1 md:grid-cols-3 gap-4 max-w-6xl mx-auto">
      
      <div class="md:col-span-3 mb-6">
        <h2 class="text-7xl font-bold tracking-tighter uppercase leading-none">КОН<span class="text-blue-600 ">ТАКТЫ</span></h2>
      </div>

      <a href="https://t.me/iwbhappy" target="_blank" class="md:col-span-2 bg-[#24A1DE] text-white rounded-[3rem] p-10 flex flex-col justify-between min-h-[250px] transition-transform hover:scale-[1.01]">
        <div class="flex justify-between items-start">
            <span class="text-xs font-bold uppercase tracking-widest bg-black/20 px-3 py-1 rounded-full text-white">Telegram</span>
        </div>
        <div>
          <h3 class="text-4xl font-bold tracking-tighter text-white">@iwbhappy</h3>
        </div>
      </a>

      <a href="https://github.com/iwbhappy" target="_blank" class="bg-zinc-900 rounded-[3rem] p-10 flex flex-col justify-between min-h-[250px] hover:bg-zinc-800 transition-colors">
        <span class="text-4xl text-white"></span>
        <div>
          <span class="text-zinc-500 text-sm uppercase font-bold tracking-widest">GitHub</span>
          <h3 class="text-3xl font-bold tracking-tighter text-white">iwbhappy</h3>
        </div>
      </a>

      <div class="md:col-span-2 bg-yellow-200 text-black rounded-[3rem] p-10 flex flex-col justify-center">
        <span class="text-xs uppercase font-bold tracking-widest mb-4 opacity-60">Форма для обращений</span>
        <form action="#" class="space-y-4">
            <input type="email" placeholder="Email" class="w-full bg-white/50 border-none rounded-2xl p-4 placeholder-black/50 focus:ring-2 focus:ring-black outline-none transition-all">
            <textarea placeholder="Текст" rows="3" class="w-full bg-white/50 border-none rounded-2xl p-4 placeholder-black/50 focus:ring-2 focus:ring-black outline-none transition-all"></textarea>
            <button class="bg-black text-white w-full py-4 rounded-2xl font-bold uppercase tracking-tighter hover:opacity-90 active:scale-95 transition-all">
                Отправить письмо
            </button>
        </form>
      </div>

      <a href="https://instagram.com/ihnenemy" target="_blank" class="bg-white text-black rounded-[3rem] p-10 flex flex-col justify-between min-h-[250px] transition-transform hover:scale-[1.01]">
        <div class="w-12 h-12  rounded-2xl"></div>
        <div>
          <span class="text-zinc-400 text-sm uppercase font-bold tracking-widest">Instagram</span>
          <h3 class="text-3xl font-bold tracking-tighter">@ihnenemy</h3>
        </div>
      </a>

      <div class="md:col-span-3 bg-zinc-900 rounded-[3rem] p-8 flex justify-between items-center px-12 border border-white/5">
        <div class="flex items-center gap-4">
            <div class="w-3 h-3 bg-green-500 rounded-full animate-pulse"></div>
            <span class="text-zinc-400 font-mono text-sm uppercase tracking-[0.2em]">Pavlodar, Kazakhstan</span>
        </div>
        <span class="text-zinc-600 text-xs font-mono">UTC +5</span>
      </div>

    </main>

    <footer class="max-w-6xl mx-auto mt-16 flex justify-center opacity-20 text-[8px] uppercase tracking-[0.6em]">
      End of page — keep it simple
    </footer>

  </body>
</html>
