<!doctype html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <title>Сайт визитка iwbhappy</title>
    <script src="script.js" defer></script>
  </head>
  <body class="bg-black text-white p-8 font-sans transition-colors duration-500">

    <header class="relative flex justify-center mb-16 max-w-6xl mx-auto">
      <div class="flex flex-col items-center">
        <span class="text-[10px] uppercase tracking-[0.4em] mb-2 font-bold opacity-50">I`m</span>
        <h1 class="text-5xl font-bold tracking-tighter uppercase leading-none">
          iwbhappy
        </h1>
      </div>

      <div class="absolute right-0 top-1/2 -translate-y-1/2">
        <button id="theme-btn" class="cursor-pointer flex items-center gap-2 text-[10px] uppercase tracking-[0.2em] font-bold border border-white/20 px-4 py-2 rounded-full hover:bg-white hover:text-black transition-all duration-300">
          <span id="theme-icon">🌙</span>
          <span id="theme-text">Dark</span>
        </button>
      </div>
    </header>

    <div class="grid grid-cols-1 md:grid-cols-4 gap-4 max-w-6xl mx-auto">
        
      <div class="md:col-span-2 md:row-span-2 bg-blue-600 rounded-[3rem] p-10 flex flex-col justify-between min-h-[400px] shadow-2xl shadow-blue-900/20">
        <div>
          <span class="text-xs uppercase tracking-widest font-bold bg-black/10 w-fit px-3 py-1 rounded-full">Направление</span>
          <h2 class="text-6xl font-bold leading-[0.9] mt-8 tracking-tighter">Startups,<br>Mob devs, <br> UI/UX</h2> <br>
        </div>
      </div>

      <a href="project.html" class="block group">
        <div class="bg-white text-black rounded-[3rem] p-8 flex flex-col justify-end min-h-[200px] relative overflow-hidden transition-all duration-300 group-hover:scale-[0.98]">
          <span class="font-bold text-2xl tracking-tighter uppercase mb-2">Проекты</span>
          <div class="flex flex-col text-sm opacity-60 font-medium">
            <span>KazUniHub</span>
            <span>ToU DigitalDay bot</span>
            <span>PVKU practice</span>
          </div>
          <div class="absolute top-8 right-8 opacity-0 group-hover:opacity-100 transition-opacity">
            <span class="text-2xl">↗</span>
          </div>
        </div>
      </a>

      <a href="contact.html" class="block group">
        <div id="contact-card" class="bg-zinc-900 text-white rounded-[3rem] p-8 flex flex-col justify-end min-h-[200px] relative overflow-hidden transition-all duration-300 group-hover:bg-zinc-800 group-hover:scale-[0.98]">
          <span class="font-bold text-2xl tracking-tighter uppercase mb-2 text-white">Контакты</span>
          <div class="flex flex-col text-sm opacity-50 font-mono text-white">
            <span>@iwbhappy</span>
            <span>@ihnenemy</span>
          </div>
          <div class="absolute top-8 right-8 opacity-0 group-hover:opacity-100 transition-opacity text-blue-500">
            <span class="text-2xl">↗</span>
          </div>
        </div>
      </a>

      <a href="about.html" class="block md:col-span-2 group">
        <div class="bg-yellow-200 text-black rounded-[3rem] p-8 flex flex-col justify-between min-h-[200px] transition-all duration-300 group-hover:scale-[0.99] group-hover:rotate-1">
          <div class="flex justify-between items-start">
            <span class="font-bold text-2xl tracking-tighter uppercase">Обо мне</span>
            <span class="text-3xl grayscale group-hover:grayscale-0 transition-all">👨‍💻</span>
          </div>
          <p class="text-xl leading-tight font-medium max-w-md">
            Тайыр. Студент ПГУ. Разрабатываю мобильные приложения на <span class="underline decoration-2">Flutter</span>.
          </p>
        </div>
      </a>
      
    </div>

    <footer class="mt-16 text-center">
        <p class="text-[10px] uppercase tracking-[0.5em] opacity-20">Много хочешь - много будет</p>
    </footer>

  </body>
</html>
